<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Button</title>
</head>
<body>
    <form action="/server">
        <div>
            <label for="apple">Apple</label>
            <input type="radio" id="apple" name="fruit">

            <label for="banana">Banana</label>
            <input type="radio" id="banana" name="fruit">
        
            <label for="mango">Mango</label>
            <input type="radio" id="mango" name="fruit">
        </div>

        <div>
            <label for="maths">maths</label>
            <input type="checkbox" id="maths" name="sub" value="mat">

            <label for="science">science</label>
            <input type="checkbox" id="maths" name="sub" value="sci">

            <label for="english">english</label>
            <input type="checkbox" id="english" name="sub" value="eng">
        </div>
            
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
