<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ques - 2</title>
</head>
<body>
    <form action="/server">
        <div>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name">
        </div>
        <div>
            Sex: 
            <input type="radio" id="male" name="gen" value="Male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gen" value="Female">
            <label for="female">Female</label>
        </div>
        <div>
            <label for="origin">Country: </label>
            <select>
                <option>Select an option</option>
                <option id="origin" name="IND">India</option>
                <option id="origin" name="USA">USA</option>
                <option id="origin" name="EU">Europe</option>
            </select>
        </div>
        <div>
            <label for="text">Message: </label>
            <br>
            <textarea></textarea>
        </div>
        <div>
            <input type="checkbox" id="sub" name="subbed" value="subbed">
            <label for="sub">Subscribe?</label>
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
