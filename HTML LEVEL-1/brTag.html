<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>br Tag</title>
</head>
<body>
    <!-- This is a poem 🐱 -->
    <p>Twinkle Twinkle little star How I wonder what you are</p>
    <p><b>Twinkle Twinkle </b><br> <i>Little star</i><br> <u>How I wonder </u><br> What you are</p>
</body>
</html>
