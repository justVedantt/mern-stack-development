<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox Attribute</title>
</head>
<body>
    <form action="/server">
        <div>
            <label for="age">I am 18+ </label>
            <input type="checkbox" id="age" name="age" checked>
        </div>
    </form>
</body>
</html>
