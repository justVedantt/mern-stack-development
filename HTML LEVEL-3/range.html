<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range Attribute</title>
</head>
<body>
    <form action="/server">
        <div>
            <label for="volume">Select your volume : </label>
            <input type="range" id="volume" min="0" max="100" name="vol" step="10" value="70">
        </div> 
        <button type="submit">Submit</button>
    </form>
</body>
</html>
